name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run unified agent quality gate
        run: python scripts/run_agent_quality_gate.py --json-out artifacts/quality_gate/latest.json

      - name: Build release evidence pack
        run: python scripts/build_release_evidence_pack.py --quality-report artifacts/quality_gate/latest.json --quiet

      - name: Upload quality gate artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-gate-artifacts
          path: artifacts/quality_gate/
          if-no-files-found: ignore

      - name: Upload release evidence artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: release-evidence-pack
          path: artifacts/release_evidence/
          if-no-files-found: error

      # To enable live provider smoke later, add TRADEFLOW_LLM_PROVIDER,
      # TRADEFLOW_LLM_MODEL, and TRADEFLOW_LLM_API_KEY as repository secrets,
      # set TRADEFLOW_LLM_SMOKE_ENABLED=true in this step's env, and pass
      # --require-live-provider. CI intentionally skips live smoke by default.
